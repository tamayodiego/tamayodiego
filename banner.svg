<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Diego Tamayo - banner animado con red de nodos</title>
<desc>Grafo de nodos conectados por lineas sobre fondo azul oscuro, con pulsos de datos viajando entre nodos, y el texto Hi soy Diego Tamayo superpuesto al centro.</desc>
<defs>
<linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#00111a"/>
<stop offset="100%" stop-color="#002966"/>
</linearGradient>
<radialGradient id="vignette" cx="50%" cy="50%" r="65%">
<stop offset="0%" stop-color="#000000" stop-opacity="0.55"/>
<stop offset="100%" stop-color="#000000" stop-opacity="0"/>
</radialGradient>
</defs>
<style>
.pulse-line { opacity: 0; animation: pulseLine 3.2s ease-in-out infinite; }
@keyframes pulseLine {
  0% { opacity: 0; }
  15% { opacity: 0.9; }
  40% { opacity: 0.2; }
  100% { opacity: 0; }
}
.pulse-dot { opacity: 0.9; }
.hero-title { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #f2fbff; text-anchor: middle; }
.hero-sub { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 13.5px; font-weight: 400; fill: #a9d6f5; text-anchor: middle; }
</style>
